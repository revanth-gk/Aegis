<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>A.E.G.I.S. Attacker Control Link</title>
  <style>
    /* Cybersecurity Utilitarian Aesthetic */
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
    
    :root {
      --bg: #0a0a0c;
      --fg: #d1d1d1;
      --accent-tp: #ff4a4a;
      --accent-fp: #f6a821;
      --accent-bp: #32d74b;
      --accent-sys: #00e5ff;
      --panel-bg: rgba(255, 255, 255, 0.03);
      --border: #222;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'JetBrains Mono', monospace;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background-image: 
        linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    h1 {
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 1.2rem;
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      margin: 0;
      background: var(--bg);
      color: var(--accent-sys);
      display: flex;
      justify-content: space-between;
    }

    .container {
      display: grid;
      grid-template-columns: 300px 1fr;
      flex-grow: 1;
      overflow: hidden;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      padding: 2rem;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .control-group h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #666;
      margin: 0;
      border-bottom: 1px dashed var(--border);
      padding-bottom: 0.5rem;
    }

    button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      font-family: inherit;
      padding: 0.75rem 1rem;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    
    button::before {
      content: '>';
      position: absolute;
      left: -15px;
      opacity: 0;
      transition: all 0.2s;
    }

    button:hover::before {
      left: 10px;
      opacity: 1;
    }
    button:hover {
      padding-left: 2rem;
    }

    button.btn-tp:hover { border-color: var(--accent-tp); color: var(--accent-tp); }
    button.btn-fp:hover { border-color: var(--accent-fp); color: var(--accent-fp); }
    button.btn-bp:hover { border-color: var(--accent-bp); color: var(--accent-bp); }
    
    .btn-loop {
      background: var(--panel-bg);
      text-align: center;
      text-transform: uppercase;
      font-weight: bold;
    }
    .btn-loop:hover { border-color: var(--accent-sys); color: var(--accent-sys); padding-left: 1rem; }
    .btn-loop:hover::before { display: none; }

    .btn-loop.active {
      background: var(--accent-sys);
      color: var(--bg);
    }

    .terminal {
      padding: 2rem;
      overflow-y: auto;
      font-size: 0.9rem;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      scrollbar-color: var(--border) var(--bg);
    }

    .log-entry {
      margin-bottom: 0.5rem;
      animation: fadeIn 0.3s ease-out;
    }

    .log-timestamp { color: #666; margin-right: 1rem; }
    .log-req { color: var(--accent-sys); }
    .log-output { color: #888; padding-left: 2rem; white-space: pre-wrap; font-size: 0.8rem; }
    
    .status {
      font-size: 0.8rem;
      padding: 0.5rem;
      text-align: center;
      border: 1px solid var(--border);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <h1><span>A.E.G.I.S. ATTACKER CONTROLLER</span><span id="target-pod">TARGET: attacker-pod</span></h1>
  
  <div class="container">
    <div class="sidebar">
      <div class="status" id="conn-status" style="color: var(--accent-sys); border-color: var(--accent-sys);">LINK ACTIVE</div>
      
      <div class="control-group">
        <h2>Single-Shot Payloads</h2>
        <button class="btn-tp" onclick="fire('tp')">[TP] Trigger C2 / Exfil</button>
        <button class="btn-fp" onclick="fire('fp')">[FP] Trigger Suspicious Read</button>
        <button class="btn-bp" onclick="fire('bp')">[BP] Trigger Standard Admin</button>
      </div>

      <div class="control-group">
        <h2>Continuous Assault</h2>
        <button id="loop-btn" class="btn-loop" onclick="toggleLoop()">ENGAGE AUTO-FIRE</button>
      </div>
    </div>
    
    <div class="terminal" id="terminal">
      <div class="log-entry">
        <span class="log-timestamp">00:00:00</span>
        <span style="color: var(--fg);">System initialized. Ready to deploy payloads.</span>
      </div>
    </div>
  </div>

  <script>
    const term = document.getElementById('terminal');
    let looping = false;

    function log(msg, output = null) {
      const now = new Date().toLocaleTimeString('en-US', {hour12: false});
      const el = document.createElement('div');
      el.className = 'log-entry';
      let html = `<span class="log-timestamp">${now}</span><span class="log-req">${msg}</span>`;
      if (output) {
        html += `<div class="log-output">${output}</div>`;
      }
      el.innerHTML = html;
      term.appendChild(el);
      term.scrollTop = term.scrollHeight;
    }

    async function fire(type) {
      log(`Initiating payload [${type.toUpperCase()}]...`);
      try {
        const res = await fetch(`/api/fire/${type}`, { method: 'POST' });
        const data = await res.json();
        log(`✓ Payload delivered: ${data.message}`, data.output);
      } catch (e) {
        log(`✗ Payload delivery failed: ${e.message}`);
      }
    }

    async function toggleLoop() {
      const btn = document.getElementById('loop-btn');
      if (!looping) {
        try {
          await fetch('/api/fire/loop/start', { method: 'POST' });
          looping = true;
          btn.classList.add('active');
          btn.innerText = "HALT AUTO-FIRE";
          log("AUTO-FIRE ENGAGED. Deploying mixed payloads every 5s...");
        } catch (e) { log(`Error: ${e.message}`); }
      } else {
        try {
          await fetch('/api/fire/loop/stop', { method: 'POST' });
          looping = false;
          btn.classList.remove('active');
          btn.innerText = "ENGAGE AUTO-FIRE";
          log("AUTO-FIRE HALTED.");
        } catch (e) { log(`Error: ${e.message}`); }
      }
    }
  </script>
</body>
</html>
