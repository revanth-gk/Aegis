# Kind cluster configuration for Sentinel-Core
# Single-node cluster (control-plane with worker role)
# Optimized for cgroupv2 / Arch Linux compatibility
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: sentinel-core
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Tetragon gRPC endpoint (for event forwarder)
      - containerPort: 54321
        hostPort: 54321
        protocol: TCP
      # NodePort range for services
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP
networking:
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"
