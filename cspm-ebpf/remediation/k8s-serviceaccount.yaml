# Kubernetes ServiceAccount and RBAC for RemediationAgent
# This manifest creates the necessary permissions for in-cluster deployment

---
apiVersion: v1
kind: Namespace
metadata:
  name: sentinel-core
  labels:
    name: sentinel-core

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: remediation-agent
  namespace: sentinel-core
  labels:
    app: sentinel-core
    component: remediation-agent

---
# Role for monitored namespace (production)
# Duplicate this Role and RoleBinding for each namespace you want to monitor
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: remediation-agent
  namespace: production  # Change to your monitored namespace
  labels:
    app: sentinel-core
    component: remediation-agent
rules:
# Permission to execute commands in pods (for SIGKILL actions)
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]

# Permission to read pod information
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

# Permission to apply NetworkPolicy patches
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["create", "update", "patch"]

# Permission to patch pod security contexts
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["update", "patch"]

# Permission to apply PodSecurityPolicy (if using PSP)
- apiGroups: ["policy"]
  resources: ["podsecuritypolicies"]
  verbs: ["use"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: remediation-agent
  namespace: production  # Change to your monitored namespace
  labels:
    app: sentinel-core
    component: remediation-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: remediation-agent
subjects:
- kind: ServiceAccount
  name: remediation-agent
  namespace: sentinel-core

---
# Additional Role for staging namespace (example)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: remediation-agent
  namespace: staging
  labels:
    app: sentinel-core
    component: remediation-agent
rules:
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "update", "patch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: remediation-agent
  namespace: staging
  labels:
    app: sentinel-core
    component: remediation-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: remediation-agent
subjects:
- kind: ServiceAccount
  name: remediation-agent
  namespace: sentinel-core

---
# IMPORTANT SECURITY NOTES:
# 
# 1. LEAST PRIVILEGE: This ServiceAccount has minimal required permissions
#    - NO cluster-admin or namespace-admin roles
#    - NO delete permissions
#    - Limited to specific monitored namespaces
#
# 2. NAMESPACE ISOLATION: Create separate Role + RoleBinding for each
#    monitored namespace. Do NOT use ClusterRole/ClusterRoleBinding.
#
# 3. AUDIT: All remediation actions are logged to Redis audit trail
#    with 90-day retention for compliance and forensic analysis.
#
# 4. TESTING: Start with dry_run=true to validate behavior before
#    enabling actual remediation actions.
